<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Satellite Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: 'SF Mono', 'Fira Code', monospace; overflow: hidden; touch-action: none; }
  canvas { display: block; }

  #ui {
    position: fixed; top: 0; left: 0; width: 300px; padding: 16px;
    background: rgba(0,0,0,0.88); border-right: 1px solid #222;
    height: 100vh; overflow-y: auto; z-index: 10;
    -webkit-overflow-scrolling: touch;
  }
  h1 { font-size: 13px; color: #7affc1; margin-bottom: 3px; letter-spacing: 2px; }
  .subtitle { font-size: 10px; color: #666; margin-bottom: 14px; }
  .stat { font-size: 10px; color: #888; margin-bottom: 3px; }
  .stat span { color: #7affc1; }

  .section { margin-top: 12px; border-top: 1px solid #222; padding-top: 10px; }
  .section label { font-size: 10px; color: #aaa; display: block; margin-bottom: 5px; }
  .section input[type=range] {
    width: 100%; -webkit-appearance: none; background: #222; height: 3px;
    border-radius: 2px; outline: none;
  }
  .section input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    background: #7affc1; border-radius: 50%; cursor: pointer;
  }
  .range-labels { display: flex; justify-content: space-between; font-size: 9px; color: #555; margin-top: 2px; }

  .tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    padding: 3px 8px; font-size: 9px; border: 1px solid #333; border-radius: 10px;
    cursor: pointer; background: transparent; color: #666;
    font-family: inherit; transition: all 0.2s; white-space: nowrap;
  }
  .tag.active { border-color: #7affc1; color: #7affc1; }
  .tag.country-active { border-color: #ff9944; color: #ff9944; background: rgba(255,153,68,0.1); }
  .tag:hover { border-color: #7affc1; }
  .tag .count { color: #555; margin-left: 3px; }
  .tag.country-active .count { color: #cc7733; }

  #tooltip {
    position: fixed; display: none; background: rgba(0,0,0,0.92);
    border: 1px solid rgba(122,255,193,0.5); padding: 10px 12px; border-radius: 4px;
    font-size: 10px; pointer-events: none; z-index: 100; max-width: 280px;
  }
  #tooltip .name { color: #7affc1; font-size: 12px; margin-bottom: 3px; font-weight: bold; }
  #tooltip .detail { color: #aaa; margin: 1px 0; }

  #loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 13px; color: #7affc1; z-index: 200; text-align: center;
  }
  #loading .spinner {
    width: 36px; height: 36px; border: 2px solid #222; border-top: 2px solid #7affc1;
    border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .legend-item { display: flex; align-items: center; font-size: 9px; color: #888; margin: 3px 0; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }

  /* Mobile toggle */
  #ui-toggle {
    display: none; position: fixed; top: 10px; left: 10px; z-index: 20;
    background: rgba(0,0,0,0.8); border: 1px solid #333; border-radius: 6px;
    color: #7affc1; font-size: 20px; width: 36px; height: 36px;
    cursor: pointer; font-family: inherit;
  }
  #ui-toggle.open { left: 310px; }

  /* Mobile */
  @media (max-width: 768px) {
    #ui { width: 280px; padding: 14px; transform: translateX(-100%); transition: transform 0.3s; }
    #ui.open { transform: translateX(0); }
    #ui-toggle { display: block; }
    #tooltip { max-width: 220px; font-size: 9px; }
    #tooltip .name { font-size: 11px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>衛星データを読み込み中...</div>
  <div id="load-status" style="font-size:10px;color:#666;margin-top:6px;"></div>
</div>

<button id="ui-toggle">☰</button>

<div id="ui" style="display:none;">
  <h1>SATELLITE TRACKER</h1>
  <div class="subtitle">Real-time orbital visualization — SGP4</div>

  <div class="stat">表示中: <span id="visible-count">0</span> / <span id="total-count">0</span></div>
  <div class="stat">時刻: <span id="update-time">—</span></div>

  <div class="section">
    <label>国・地域フィルター</label>
    <div class="tags" id="country-filters"></div>
  </div>

  <div class="section">
    <label>衛星種別</label>
    <div class="tags" id="purpose-filters"></div>
  </div>

  <div class="section">
    <label>軌道カテゴリ</label>
    <div class="tags" id="orbit-filters"></div>
  </div>

  <div class="section">
    <label>高度 (km)</label>
    <input type="range" id="alt-min" min="0" max="50000" value="0" step="100">
    <div class="range-labels"><span>下限: <span id="alt-min-val">0</span> km</span></div>
    <div style="height:6px"></div>
    <input type="range" id="alt-max" min="0" max="50000" value="50000" step="100">
    <div class="range-labels"><span>上限: <span id="alt-max-val">50,000</span> km</span></div>
  </div>

  <div class="section">
    <label>色分け（実スケール）</label>
    <div class="legend-item"><div class="legend-dot" style="background:#7affc1;"></div>LEO 低軌道 (〜2,000 km)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffc87a;"></div>MEO 中軌道 (2,000–35,000 km)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff7aa0;"></div>GEO 静止軌道 (~35,786 km)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c07aff;"></div>HEO 高軌道 (>36,000 km)</div>
  </div>

  <div class="section" style="font-size:9px;color:#444;">
    ドラッグ: 回転 / スクロール: ズーム / ホバー: 詳細
    <br>データ: CelesTrak OMM + SATCAT
  </div>
</div>

<div id="tooltip">
  <div class="name" id="tt-name"></div>
  <div class="detail" id="tt-owner"></div>
  <div class="detail" id="tt-type"></div>
  <div class="detail" id="tt-purpose"></div>
  <div class="detail" id="tt-launch"></div>
  <div class="detail" id="tt-norad"></div>
  <div class="detail" id="tt-alt"></div>
  <div class="detail" id="tt-vel"></div>
  <div class="detail" id="tt-lat"></div>
  <div class="detail" id="tt-period"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/satellite.js@5.0.0/dist/satellite.min.js"></script>

<script>
const EARTH_RADIUS_KM = 6371;
const DEG2RAD = Math.PI / 180;
const PI = Math.PI;

function altToRadius(altKm) { return altKm <= 0 ? 1.01 : 1 + altKm / EARTH_RADIUS_KM; }

const DATA_FILES = [{ file: 'data/active.json', label: '全アクティブ衛星' }];

const OWNER_NAMES = {
  'JPN':'日本','US':'アメリカ','CIS':'ロシア/CIS','PRC':'中国','ESA':'ESA','IND':'インド',
  'FR':'フランス','GER':'ドイツ','UK':'イギリス','IT':'イタリア','CA':'カナダ',
  'SKOR':'韓国','SPN':'スペイン','TURK':'トルコ','AUS':'オーストラリア','ARGN':'アルゼンチン',
  'SES':'SES','ITSO':'Intelsat','O3B':'O3b','GLOB':'Globalstar','NOR':'ノルウェー',
  'FIN':'フィンランド','UAE':'UAE','BRAZ':'ブラジル','ISRA':'イスラエル',
  'EUTE':'Eutelsat','TAIW':'台湾','INDO':'インドネシア','LUXE':'ルクセンブルク',
};
const LAUNCH_SITE_NAMES = {
  'AFETR':'ケープカナベラル','AFWTR':'ヴァンデンバーグ','TANSC':'種子島',
  'PLES':'プレセツク','TYMSC':'バイコヌール','SRILR':'スリハリコタ',
  'JSC':'酒泉','XSC':'西昌','TSC':'太原','WMLP':'ウェンチャン',
  'GUY':'ギアナ','VOST':'ボストチヌイ','KSCUT':'内之浦','SEAL':'海上',
};
const OBJ_TYPE_NAMES = {'PAY':'衛星','R/B':'ロケット本体','DEB':'デブリ','TBA':'未分類'};

// Top countries to show as filter buttons (with counts filled at runtime)
const COUNTRY_FILTERS = [
  {code:'JPN',label:'日本'},{code:'US',label:'米国'},{code:'PRC',label:'中国'},
  {code:'UK',label:'英国'},{code:'CIS',label:'ロシア'},{code:'IND',label:'インド'},
  {code:'ESA',label:'ESA'},{code:'FR',label:'仏'},{code:'IT',label:'伊'},
  {code:'SKOR',label:'韓国'},{code:'GER',label:'独'},{code:'CA',label:'加'},
];

const ORBIT_CATEGORIES = {
  'leo':{label:'LEO',active:true},'meo':{label:'MEO',active:true},
  'geo':{label:'GEO',active:true},'heo':{label:'HEO',active:true},
};

function classifyOrbit(a){return a<2000?'leo':a<35000?'meo':a<36500?'geo':'heo';}
function getColorForAltitude(a){return a<2000?new THREE.Color(0x7affc1):a<35000?new THREE.Color(0xffc87a):a<36500?new THREE.Color(0xff7aa0):new THREE.Color(0xc07aff);}

let scene,camera,renderer,earth,atmosphere,satPointCloud;
let allSatellites=[];
let satMetadata={};
let activeCountryFilter=null; // null=all, string=country code
let activePurposeFilter=null; // null=all, string=purpose key

// Purpose categories for filter buttons
const PURPOSE_FILTERS = [
  {key:'Communications',label:'通信'},
  {key:'Earth Observation',label:'地球観測'},
  {key:'Navigation/Global Positioning',label:'測位'},
  {key:'Space Science',label:'宇宙科学'},
  {key:'Surveillance',label:'監視'},
  {key:'Technology Development',label:'技術開発'},
  {key:'Earth Science',label:'地球科学'},
  {key:'Meteorological',label:'気象'},
];
// Detail → Japanese label for tooltip
const DETAIL_NAMES = {
  'Optical Imaging':'光学撮像','Radar Imaging':'レーダー撮像(SAR)',
  'Radar Imaging (SAR)':'SAR撮像','Multispectral Imaging':'マルチスペクトル撮像',
  'Hyperspectral Imaging':'ハイパースペクトル撮像','Infrared Imaging':'赤外撮像',
  'Video Imaging':'動画撮像','Meteorology':'気象観測',
  'Electronic Intelligence':'電子情報収集(ELINT)','Early Warning':'早期警戒',
  'Earth Science':'地球科学','Automatic Identification System (AIS)':'船舶追跡(AIS)',
  'Radar Imaging/Earth Science':'SAR/地球科学','Radio Spectrum Monitoring':'電波監視',
  'Meteorology, Automatic Identification System (AIS)':'気象/AIS',
  'Earth Science/Meterology':'地球科学/気象','Maritime Surveillance':'海洋監視',
  'Amateur Radio':'アマチュア無線','Internet of Things (IoT)':'IoT',
  'Data Relay':'データ中継','Remote Sensing':'リモートセンシング',
};
let mouse=new THREE.Vector2(-999,-999);
let raycaster=new THREE.Raycaster();
raycaster.params.Points.threshold=0.04;
let isDragging=false,dragMoved=false;
let prevMouse={x:0,y:0};
let spherical={theta:0,phi:PI/2,radius:4};
let touchDist=0; // for pinch zoom

// ============================================================
function ommToSatrec(omm){
  const nid=String(omm.NORAD_CAT_ID||0).padStart(5);
  const cls=omm.CLASSIFICATION_TYPE||'U';
  const intl=(omm.OBJECT_ID||'').replace(/^[0-9]{4}-/,m=>m).padEnd(8).substring(0,8);
  const ed=new Date(omm.EPOCH),yr=ed.getUTCFullYear(),ys=yr%100;
  const j1=new Date(Date.UTC(yr,0,1)),doy=(ed-j1)/86400000+1;
  const mmd=omm.MEAN_MOTION_DOT||0,mmdd=omm.MEAN_MOTION_DDOT||0,bs=omm.BSTAR||0;
  const et=omm.EPHEMERIS_TYPE||0,esn=omm.ELEMENT_SET_NO||999;
  function fE(v){if(v===0)return' 00000-0';const s=v<0?'-':' ',a=Math.abs(v),e=Math.floor(Math.log10(a)),m=a/Math.pow(10,e);return`${s}${(m*100000).toFixed(0).padStart(5,'0').substring(0,5)}${e>=0?'+':'-'}${Math.abs(e)}`;}
  function fM(v){if(v===0)return' .00000000';return(v<0?'-':' ')+Math.abs(v).toFixed(8).replace(/^0\./,'.');}
  let l1=['1 ',nid,cls,' ',intl.padEnd(8),' ',String(ys).padStart(2,'0'),doy.toFixed(8).padStart(12,'0'),' ',fM(mmd),' ',fE(mmdd),' ',fE(bs),' ',String(et),' ',String(esn).padStart(4)].join('').padEnd(68).substring(0,68);
  l1+=cksum(l1);
  const ecc=(omm.ECCENTRICITY||0).toFixed(7).replace('0.','');
  let l2=['2 ',nid,' ',(omm.INCLINATION||0).toFixed(4).padStart(8),' ',(omm.RA_OF_ASC_NODE||0).toFixed(4).padStart(8),' ',ecc.padStart(7,'0'),' ',(omm.ARG_OF_PERICENTER||0).toFixed(4).padStart(8),' ',(omm.MEAN_ANOMALY||0).toFixed(4).padStart(8),' ',(omm.MEAN_MOTION||0).toFixed(8).padStart(11),String(omm.REV_AT_EPOCH||0).padStart(5)].join('').padEnd(68).substring(0,68);
  l2+=cksum(l2);
  return satellite.twoline2satrec(l1,l2);
}
function cksum(l){let s=0;for(let i=0;i<68;i++){const c=l[i];if(c>='0'&&c<='9')s+=parseInt(c);else if(c==='-')s+=1;}return String(s%10);}

// ============================================================
function initScene(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.01,1000);
  camera.position.set(0,0,4);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  document.body.appendChild(renderer.domElement);

  const earthGeo=new THREE.SphereGeometry(1,64,64);
  const earthTex=new THREE.TextureLoader().load('earth-texture-small.jpg');
  earth=new THREE.Mesh(earthGeo,new THREE.MeshPhongMaterial({map:earthTex,specular:0x111122,shininess:15}));
  scene.add(earth);

  atmosphere=new THREE.Mesh(new THREE.SphereGeometry(1.025,64,64),new THREE.MeshBasicMaterial({color:0x4488ff,transparent:true,opacity:0.07,side:THREE.BackSide}));
  scene.add(atmosphere);

  scene.add(new THREE.AmbientLight(0x334466,0.6));
  const sun=new THREE.DirectionalLight(0xffffff,1.0);sun.position.set(5,2,5);scene.add(sun);

  const sg=new THREE.BufferGeometry(),sp=new Float32Array(4000*3);
  for(let i=0;i<4000;i++){sp[i*3]=(Math.random()-.5)*200;sp[i*3+1]=(Math.random()-.5)*200;sp[i*3+2]=(Math.random()-.5)*200;}
  sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.12,transparent:true,opacity:0.5})));
}

// ============================================================
async function loadSatelliteData(){
  const st=document.getElementById('load-status');
  st.textContent='メタデータ読み込み中...';
  try{const r=await fetch('data/metadata.json');satMetadata=await r.json();}catch(e){console.warn(e);}

  st.textContent='OMM読み込み中...';
  let raw=[];
  for(const src of DATA_FILES){try{const r=await fetch(src.file);const d=await r.json();raw=raw.concat(d);st.textContent=`${d.length}件`;}catch(e){st.textContent='読み込み失敗';}}

  st.textContent=`${raw.length}件を変換中...`;
  let ok=0,ng=0;
  for(const omm of raw){
    try{
      const sr=ommToSatrec(omm);
      if(!satellite.propagate(sr,new Date()).position){ng++;continue;}
      const nid=String(omm.NORAD_CAT_ID||''),meta=satMetadata[nid]||{};
      allSatellites.push({
        name:omm.OBJECT_NAME||'Unknown',noradId:nid,satrec:sr,
        position:new THREE.Vector3(),altitude:0,velocity:0,lat:0,lon:0,orbitType:'leo',
        owner:meta.owner||'',launchDate:meta.launch||'',launchSite:meta.site||'',
        objType:meta.type||'',isJapanese:!!meta.jpn,
        purpose:meta.purpose||'',detail:meta.detail||'',users:meta.users||'',
      });ok++;
    }catch(e){ng++;}
  }
  st.textContent=`${ok} 衛星`;
  document.getElementById('total-count').textContent=ok.toLocaleString();
}

// ============================================================
function updateSatellitePositions(){
  const now=new Date(),gmst=satellite.gstime(now);
  for(const sat of allSatellites){
    try{
      const pv=satellite.propagate(sat.satrec,now);
      if(!pv.position){sat.altitude=-1;continue;}
      const geo=satellite.eciToGeodetic(pv.position,gmst);
      sat.lat=satellite.degreesLat(geo.latitude);sat.lon=satellite.degreesLong(geo.longitude);
      sat.altitude=geo.height;sat.velocity=Math.sqrt(pv.velocity.x**2+pv.velocity.y**2+pv.velocity.z**2);
      sat.orbitType=classifyOrbit(sat.altitude);
      const r=altToRadius(sat.altitude),phi=(90-sat.lat)*DEG2RAD,theta=(sat.lon+180)*DEG2RAD;
      sat.position.set(r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
    }catch(e){sat.altitude=-1;}
  }
}

// ============================================================
function createGlowTexture(){
  const s=64,c=document.createElement('canvas');c.width=s;c.height=s;
  const x=c.getContext('2d'),g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.07,'rgba(255,255,255,0.85)');
  g.addColorStop(0.15,'rgba(220,255,240,0.5)');g.addColorStop(0.35,'rgba(122,255,193,0.18)');
  g.addColorStop(0.6,'rgba(122,255,193,0.05)');g.addColorStop(1,'rgba(122,255,193,0)');
  x.fillStyle=g;x.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(c);t.needsUpdate=true;return t;
}

// ============================================================
let heoSprites=[];
const satVS=`
  attribute float phase; attribute float visible;
  varying vec3 vColor; varying float vAlpha;
  uniform float uTime;
  void main(){
    vColor=color;
    float speed=0.8+phase*0.6;
    float shimmer=0.7+0.3*sin(uTime*speed+phase*6.2831);
    vAlpha=shimmer*visible;
    vec4 mv=modelViewMatrix*vec4(position,1.0);
    gl_PointSize=(0.09+shimmer*0.03)*(300.0/-mv.z);
    gl_Position=projectionMatrix*mv;
  }`;
const satFS=`
  varying vec3 vColor; varying float vAlpha;
  uniform sampler2D uGlowMap;
  void main(){
    if(vAlpha<0.01)discard;
    vec4 t=texture2D(uGlowMap,gl_PointCoord);
    gl_FragColor=vec4(vColor*t.rgb*vAlpha,t.a*vAlpha);
  }`;

function createSatelliteCloud(){
  const n=allSatellites.length,geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(n*3),3));
  geo.setAttribute('color',new THREE.BufferAttribute(new Float32Array(n*3),3));
  const ph=new Float32Array(n),vi=new Float32Array(n);
  for(let i=0;i<n;i++){ph[i]=Math.random();vi[i]=1;}
  geo.setAttribute('phase',new THREE.BufferAttribute(ph,1));
  geo.setAttribute('visible',new THREE.BufferAttribute(vi,1));
  const mat=new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0},uGlowMap:{value:createGlowTexture()}},
    vertexShader:satVS,fragmentShader:satFS,vertexColors:true,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
  });
  satPointCloud=new THREE.Points(geo,mat);scene.add(satPointCloud);
  for(let i=0;i<n;i++)allSatellites[i]._spriteIndex=-1;
}

function getOrCreateSprite(sat,tex){
  if(sat._sprite)return sat._sprite;
  const m=new THREE.SpriteMaterial({map:tex,color:getColorForAltitude(sat.altitude).getHex(),transparent:true,opacity:0.9,blending:THREE.AdditiveBlending,depthWrite:false});
  const s=new THREE.Sprite(m);scene.add(s);sat._sprite=s;heoSprites.push(s);return s;
}

const glowTexRef={current:null};
function syncPointCloud(){
  if(!satPointCloud)return;
  if(!glowTexRef.current)glowTexRef.current=createGlowTexture();
  const altMin=parseFloat(document.getElementById('alt-min').value);
  const altMax=parseFloat(document.getElementById('alt-max').value);
  const pos=satPointCloud.geometry.attributes.position.array;
  const col=satPointCloud.geometry.attributes.color.array;
  const vis=satPointCloud.geometry.attributes.visible.array;
  let cnt=0;
  for(let i=0;i<allSatellites.length;i++){
    const sat=allSatellites[i];
    const show=sat.altitude>=0&&sat.altitude>=altMin&&sat.altitude<=altMax&&
      ORBIT_CATEGORIES[sat.orbitType]?.active&&
      (!activeCountryFilter||sat.owner===activeCountryFilter)&&
      (!activePurposeFilter||sat.purpose===activePurposeFilter);
    if(show){
      cnt++;
      if(sat.altitude>2000){
        pos[i*3]=0;pos[i*3+1]=0;pos[i*3+2]=-999;vis[i]=0;
        const sp=getOrCreateSprite(sat,glowTexRef.current);
        sp.visible=true;sp.position.copy(sat.position);
        sp.scale.setScalar(sat.position.length()*0.06);
        sp.material.color.set(getColorForAltitude(sat.altitude));
      }else{
        pos[i*3]=sat.position.x;pos[i*3+1]=sat.position.y;pos[i*3+2]=sat.position.z;
        const c=getColorForAltitude(sat.altitude);col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;
        vis[i]=1;if(sat._sprite)sat._sprite.visible=false;
      }
    }else{
      pos[i*3]=0;pos[i*3+1]=0;pos[i*3+2]=-999;vis[i]=0;
      col[i*3]=0;col[i*3+1]=0;col[i*3+2]=0;
      if(sat._sprite)sat._sprite.visible=false;
    }
  }
  satPointCloud.geometry.attributes.position.needsUpdate=true;
  satPointCloud.geometry.attributes.color.needsUpdate=true;
  satPointCloud.geometry.attributes.visible.needsUpdate=true;
  document.getElementById('visible-count').textContent=cnt.toLocaleString();
}

// ============================================================
function initUI(){
  document.getElementById('ui').style.display='';

  // Country filter buttons with counts
  const countryCounts={};
  for(const sat of allSatellites){const o=sat.owner;if(o)countryCounts[o]=(countryCounts[o]||0)+1;}

  const cc=document.getElementById('country-filters');
  // "ALL" button
  const allBtn=document.createElement('button');
  allBtn.className='tag active';allBtn.innerHTML=`すべて <span class="count">${allSatellites.length.toLocaleString()}</span>`;
  allBtn.addEventListener('click',()=>{
    activeCountryFilter=null;
    cc.querySelectorAll('.tag').forEach(b=>{b.classList.remove('active','country-active');});
    allBtn.classList.add('active');
    syncPointCloud();
  });
  cc.appendChild(allBtn);

  for(const cf of COUNTRY_FILTERS){
    const count=countryCounts[cf.code]||0;
    if(count===0)continue;
    const btn=document.createElement('button');
    btn.className='tag';
    btn.innerHTML=`${cf.label} <span class="count">${count}</span>`;
    btn.addEventListener('click',()=>{
      if(activeCountryFilter===cf.code){
        activeCountryFilter=null;
        cc.querySelectorAll('.tag').forEach(b=>b.classList.remove('active','country-active'));
        allBtn.classList.add('active');
      }else{
        activeCountryFilter=cf.code;
        cc.querySelectorAll('.tag').forEach(b=>b.classList.remove('active','country-active'));
        btn.classList.add('country-active');
      }
      syncPointCloud();
    });
    cc.appendChild(btn);
  }

  // Purpose filter buttons
  const purposeCounts={};
  for(const sat of allSatellites){const p=sat.purpose;if(p)purposeCounts[p]=(purposeCounts[p]||0)+1;}
  const pc=document.getElementById('purpose-filters');
  const allPBtn=document.createElement('button');
  allPBtn.className='tag active';allPBtn.innerHTML=`すべて`;
  allPBtn.addEventListener('click',()=>{
    activePurposeFilter=null;
    pc.querySelectorAll('.tag').forEach(b=>b.classList.remove('active','country-active'));
    allPBtn.classList.add('active');syncPointCloud();
  });
  pc.appendChild(allPBtn);
  for(const pf of PURPOSE_FILTERS){
    const count=purposeCounts[pf.key]||0;
    if(count===0)continue;
    const btn=document.createElement('button');btn.className='tag';
    btn.innerHTML=`${pf.label} <span class="count">${count}</span>`;
    btn.addEventListener('click',()=>{
      if(activePurposeFilter===pf.key){activePurposeFilter=null;pc.querySelectorAll('.tag').forEach(b=>b.classList.remove('active','country-active'));allPBtn.classList.add('active');}
      else{activePurposeFilter=pf.key;pc.querySelectorAll('.tag').forEach(b=>b.classList.remove('active','country-active'));btn.classList.add('country-active');}
      syncPointCloud();
    });
    pc.appendChild(btn);
  }

  // Orbit category buttons
  const oc=document.getElementById('orbit-filters');
  for(const [key,cat] of Object.entries(ORBIT_CATEGORIES)){
    const btn=document.createElement('button');btn.className='tag active';btn.textContent=cat.label;
    btn.addEventListener('click',()=>{cat.active=!cat.active;btn.classList.toggle('active');syncPointCloud();});
    oc.appendChild(btn);
  }

  // Range sliders
  document.getElementById('alt-min').addEventListener('input',e=>{
    document.getElementById('alt-min-val').textContent=Number(e.target.value).toLocaleString();syncPointCloud();});
  document.getElementById('alt-max').addEventListener('input',e=>{
    document.getElementById('alt-max-val').textContent=Number(e.target.value).toLocaleString();syncPointCloud();});

  // Mobile toggle
  const toggle=document.getElementById('ui-toggle');
  const ui=document.getElementById('ui');
  toggle.addEventListener('click',()=>{ui.classList.toggle('open');toggle.classList.toggle('open');});
}

// ============================================================
function initControls(){
  const el=renderer.domElement;
  // Mouse
  el.addEventListener('mousedown',e=>{isDragging=true;dragMoved=false;prevMouse.x=e.clientX;prevMouse.y=e.clientY;});
  el.addEventListener('mousemove',e=>{
    mouse.x=(e.clientX/window.innerWidth)*2-1;mouse.y=-(e.clientY/window.innerHeight)*2+1;
    if(isDragging){const dx=e.clientX-prevMouse.x,dy=e.clientY-prevMouse.y;
      if(Math.abs(dx)>1||Math.abs(dy)>1)dragMoved=true;
      spherical.theta-=dx*0.005;spherical.phi=Math.max(0.1,Math.min(PI-0.1,spherical.phi-dy*0.005));
      prevMouse.x=e.clientX;prevMouse.y=e.clientY;}
  });
  el.addEventListener('mouseup',()=>{isDragging=false;});
  el.addEventListener('mouseleave',()=>{isDragging=false;});
  el.addEventListener('wheel',e=>{spherical.radius=Math.max(1.3,Math.min(50,spherical.radius+e.deltaY*0.005));});

  // Touch — drag to rotate, pinch to zoom
  el.addEventListener('touchstart',e=>{
    if(e.touches.length===1){isDragging=true;dragMoved=false;prevMouse.x=e.touches[0].clientX;prevMouse.y=e.touches[0].clientY;}
    if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;touchDist=Math.sqrt(dx*dx+dy*dy);}
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&isDragging){
      const dx=e.touches[0].clientX-prevMouse.x,dy=e.touches[0].clientY-prevMouse.y;
      spherical.theta-=dx*0.005;spherical.phi=Math.max(0.1,Math.min(PI-0.1,spherical.phi-dy*0.005));
      prevMouse.x=e.touches[0].clientX;prevMouse.y=e.touches[0].clientY;
    }
    if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      const d=Math.sqrt(dx*dx+dy*dy);if(touchDist>0){spherical.radius=Math.max(1.3,Math.min(50,spherical.radius*(touchDist/d)));}touchDist=d;}
  },{passive:true});
  el.addEventListener('touchend',()=>{isDragging=false;touchDist=0;},{passive:true});

  window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
}

// ============================================================
function showTooltipForSat(sat){
  const tt=document.getElementById('tooltip');tt.style.display='block';
  const mx=(mouse.x+1)/2*window.innerWidth,my=(-mouse.y+1)/2*window.innerHeight;
  tt.style.left=Math.min(mx+15,window.innerWidth-290)+'px';
  tt.style.top=Math.min(my-10,window.innerHeight-200)+'px';
  document.getElementById('tt-name').textContent=sat.name;
  document.getElementById('tt-name').style.color=sat.isJapanese?'#ff6666':'#7affc1';
  document.getElementById('tt-owner').textContent=`運用: ${OWNER_NAMES[sat.owner]||sat.owner||'不明'}`;
  document.getElementById('tt-type').textContent=`種別: ${OBJ_TYPE_NAMES[sat.objType]||sat.objType||'不明'}`;
  const purposeStr=sat.purpose?(OWNER_NAMES[sat.purpose]||sat.purpose):'';
  const detailStr=sat.detail?(DETAIL_NAMES[sat.detail]||sat.detail):'';
  document.getElementById('tt-purpose').textContent=purposeStr||detailStr?`目的: ${purposeStr}${detailStr?' / '+detailStr:''}`:'';
  let ls='';if(sat.launchDate){ls=`打上: ${sat.launchDate}`;const sn=LAUNCH_SITE_NAMES[sat.launchSite]||sat.launchSite;if(sn)ls+=` (${sn})`;}
  document.getElementById('tt-launch').textContent=ls;
  document.getElementById('tt-norad').textContent=`NORAD: ${sat.noradId}`;
  document.getElementById('tt-alt').textContent=`高度: ${sat.altitude.toFixed(1)} km`;
  document.getElementById('tt-vel').textContent=`速度: ${sat.velocity.toFixed(2)} km/s`;
  document.getElementById('tt-lat').textContent=`直下点: ${sat.lat.toFixed(2)}°N, ${sat.lon.toFixed(2)}°E`;
  document.getElementById('tt-period').textContent=`周期: ${(2*PI*Math.sqrt(Math.pow(EARTH_RADIUS_KM+sat.altitude,3)/398600.4418)/60).toFixed(1)} 分`;
}
function updateTooltip(){
  if(isDragging||!satPointCloud)return;
  raycaster.setFromCamera(mouse,camera);
  const tt=document.getElementById('tooltip');
  const hits=raycaster.intersectObject(satPointCloud);
  for(const h of hits){const s=allSatellites[h.index];if(s&&s.altitude>0&&h.point.z>-900){showTooltipForSat(s);return;}}
  const st=allSatellites.filter(s=>s._sprite&&s._sprite.visible);
  if(st.length>0){const sh=raycaster.intersectObjects(st.map(s=>s._sprite));
    if(sh.length>0){const s=st.find(s=>s._sprite===sh[0].object);if(s&&s.altitude>0){showTooltipForSat(s);return;}}}
  tt.style.display='none';
}

// ============================================================
let lastPropTime=0;
function animate(time){
  requestAnimationFrame(animate);
  camera.position.set(spherical.radius*Math.sin(spherical.phi)*Math.cos(spherical.theta),spherical.radius*Math.cos(spherical.phi),spherical.radius*Math.sin(spherical.phi)*Math.sin(spherical.theta));
  camera.lookAt(0,0,0);

  if(satPointCloud)satPointCloud.material.uniforms.uTime.value=time*0.001;
  const t=time*0.001;
  for(const sat of allSatellites){if(sat._sprite&&sat._sprite.visible){const p=sat._shimmerPhase||(sat._shimmerPhase=Math.random());sat._sprite.material.opacity=0.55+0.45*Math.sin(t*(0.8+p*0.6)+p*6.2831);}}

  if(time-lastPropTime>150){updateSatellitePositions();syncPointCloud();lastPropTime=time;}
  if(Math.floor(time/1000)!==Math.floor((time-16)/1000))document.getElementById('update-time').textContent=new Date().toLocaleTimeString('ja-JP');
  updateTooltip();renderer.render(scene,camera);
}

// ============================================================
async function main(){
  initScene();initControls();
  await loadSatelliteData();
  document.getElementById('loading').style.display='none';
  updateSatellitePositions();createSatelliteCloud();syncPointCloud();initUI();
  document.getElementById('update-time').textContent=new Date().toLocaleTimeString('ja-JP');
  requestAnimationFrame(animate);
}
main();
</script>
