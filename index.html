<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Satellite Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: 'SF Mono', 'Fira Code', monospace; overflow: hidden; touch-action: none; }
  canvas { display: block; }

  #ui {
    position: fixed; top: 0; left: 0; width: 300px; padding: 16px;
    background: rgba(0,0,0,0.88); border-right: 1px solid #222;
    height: 100vh; overflow-y: auto; z-index: 10;
    -webkit-overflow-scrolling: touch;
  }
  h1 { font-size: 13px; color: #7affc1; margin-bottom: 3px; letter-spacing: 2px; }
  .subtitle { font-size: 10px; color: #666; margin-bottom: 14px; }
  .stat { font-size: 10px; color: #888; margin-bottom: 3px; }
  .stat span { color: #7affc1; }

  .section { margin-top: 12px; border-top: 1px solid #222; padding-top: 10px; }
  .section label { font-size: 10px; color: #aaa; display: block; margin-bottom: 5px; }
  .section input[type=range] {
    width: 100%; -webkit-appearance: none; background: #222; height: 3px;
    border-radius: 2px; outline: none;
  }
  .section input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    background: #7affc1; border-radius: 50%; cursor: pointer;
  }
  .range-labels { display: flex; justify-content: space-between; font-size: 9px; color: #555; margin-top: 2px; }

  .tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    padding: 3px 8px; font-size: 9px; border: 1px solid #333; border-radius: 10px;
    cursor: pointer; background: transparent; color: #666;
    font-family: inherit; transition: all 0.2s; white-space: nowrap;
  }
  .tag.active { border-color: #7affc1; color: #7affc1; }
  .tag.country-active { border-color: #ff9944; color: #ff9944; background: rgba(255,153,68,0.1); }
  .tag:hover { border-color: #7affc1; }
  .tag .count { color: #555; margin-left: 3px; }
  .tag.country-active .count { color: #cc7733; }

  #tooltip {
    position: fixed; display: none; background: rgba(0,0,0,0.92);
    border: 1px solid rgba(122,255,193,0.5); padding: 10px 12px; border-radius: 4px;
    font-size: 10px; pointer-events: none; z-index: 100; max-width: 280px;
  }
  #tooltip .name { color: #7affc1; font-size: 12px; margin-bottom: 3px; font-weight: bold; }
  #tooltip .detail { color: #aaa; margin: 1px 0; }

  #loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 13px; color: #7affc1; z-index: 200; text-align: center;
  }
  #loading .spinner {
    width: 36px; height: 36px; border: 2px solid #222; border-top: 2px solid #7affc1;
    border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .legend-item { display: flex; align-items: center; font-size: 9px; color: #888; margin: 3px 0; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }

  /* Tab switcher */
  .tab-bar { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 1px solid #222; }
  .tab-btn {
    flex: 1; padding: 8px 0; font-size: 10px; text-align: center; cursor: pointer;
    background: transparent; border: none; border-bottom: 2px solid transparent;
    color: #555; font-family: inherit; transition: all 0.2s;
  }
  .tab-btn.active { color: #7affc1; border-bottom-color: #7affc1; }
  .tab-btn:hover { color: #7affc1; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Search panel */
  #search-input {
    width: 100%; padding: 8px 10px; background: #111; border: 1px solid #333;
    color: #fff; font-family: inherit; font-size: 11px; border-radius: 6px;
    outline: none; margin-bottom: 8px;
  }
  #search-input:focus { border-color: #7affc1; }
  #search-results {
    max-height: calc(100vh - 160px); overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .search-item {
    padding: 8px 10px; border-bottom: 1px solid #1a1a1a; cursor: pointer;
    transition: background 0.15s;
  }
  .search-item:hover { background: rgba(122,255,193,0.06); }
  .search-item .si-name { font-size: 11px; color: #ccc; margin-bottom: 2px; }
  .search-item .si-name.jpn { color: #ff8866; }
  .search-item .si-meta { font-size: 9px; color: #555; }
  .search-item .si-tag {
    display: inline-block; padding: 1px 5px; font-size: 8px;
    border: 1px solid #333; border-radius: 6px; margin-right: 3px; color: #666;
  }
  .search-item .si-tag.eo { border-color: #7affc1; color: #7affc1; }
  .search-item .si-tag.comm { border-color: #ffc87a; color: #ffc87a; }
  .search-item .si-tag.nav { border-color: #ff7aa0; color: #ff7aa0; }
  .search-item .si-tag.sci { border-color: #c07aff; color: #c07aff; }
  .search-count { font-size: 9px; color: #555; margin-bottom: 6px; }

  /* Detail panel (shown when satellite selected) */
  #detail-panel {
    position: fixed; bottom: 0; left: 300px; right: 0;
    background: rgba(0,0,0,0.92); border-top: 1px solid #222;
    padding: 14px 20px; z-index: 10; display: none;
    max-height: 200px; overflow-y: auto;
  }
  #detail-panel .dp-name { font-size: 14px; color: #7affc1; margin-bottom: 6px; font-weight: bold; }
  #detail-panel .dp-name.jpn { color: #ff8866; }
  #detail-panel .dp-row { display: inline-block; font-size: 10px; color: #888; margin-right: 16px; margin-bottom: 3px; }
  #detail-panel .dp-val { color: #ccc; }
  #detail-panel .dp-close {
    position: absolute; top: 10px; right: 16px; background: none; border: none;
    color: #555; font-size: 16px; cursor: pointer; font-family: inherit;
  }
  #detail-panel .dp-close:hover { color: #fff; }
  @media (max-width: 768px) {
    #detail-panel { left: 0; }
  }

  /* Command Palette */
  #cmd-overlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: flex-start; justify-content: center; padding-top: 15vh;
  }
  #cmd-overlay.open { display: flex; }
  #cmd-box {
    width: 520px; max-width: 90vw; background: rgba(10,10,20,0.95);
    border: 1px solid #333; border-radius: 10px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  #cmd-input {
    width: 100%; padding: 14px 16px; background: transparent; border: none;
    border-bottom: 1px solid #222; color: #fff; font-family: inherit;
    font-size: 15px; outline: none;
  }
  #cmd-input::placeholder { color: #444; }
  #cmd-chips { padding: 6px 12px; min-height: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
  .cmd-chip {
    padding: 2px 8px; font-size: 9px; border-radius: 8px;
    background: rgba(122,255,193,0.15); color: #7affc1; border: 1px solid rgba(122,255,193,0.3);
  }
  #cmd-suggest { padding: 6px 12px; display: flex; flex-wrap: wrap; gap: 4px; }
  .cmd-suggest-btn {
    padding: 3px 10px; font-size: 9px; border: 1px solid #2a2a2a; border-radius: 10px;
    background: transparent; color: #555; cursor: pointer; font-family: inherit;
  }
  .cmd-suggest-btn:hover { border-color: #7affc1; color: #7affc1; }
  #cmd-results {
    max-height: 45vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  #cmd-count { padding: 4px 14px; font-size: 9px; color: #444; }
  .cmd-item {
    padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #1a1a1a;
    transition: background 0.1s;
  }
  .cmd-item:hover, .cmd-item.active { background: rgba(122,255,193,0.08); }
  .cmd-item .ci-name { font-size: 12px; color: #ddd; }
  .cmd-item .ci-name.jpn { color: #ff8866; }
  .cmd-item .ci-sub { font-size: 9px; color: #555; margin-top: 2px; }
  .cmd-item .ci-tag {
    display: inline-block; padding: 1px 5px; font-size: 8px;
    border: 1px solid #333; border-radius: 6px; margin-right: 3px; color: #555;
  }
  .cmd-item .ci-tag.hl { border-color: #7affc1; color: #7affc1; }

  /* Mobile toggle */
  #ui-toggle {
    display: none; position: fixed; top: 10px; left: 10px; z-index: 20;
    background: rgba(0,0,0,0.8); border: 1px solid #333; border-radius: 6px;
    color: #7affc1; font-size: 20px; width: 36px; height: 36px;
    cursor: pointer; font-family: inherit;
  }
  #ui-toggle.open { left: 310px; }

  /* Mobile */
  @media (max-width: 768px) {
    #ui { width: 280px; padding: 14px; transform: translateX(-100%); transition: transform 0.3s; }
    #ui.open { transform: translateX(0); }
    #ui-toggle { display: block; }
    #tooltip { max-width: 220px; font-size: 9px; }
    #tooltip .name { font-size: 11px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>衛星データを読み込み中...</div>
  <div id="load-status" style="font-size:10px;color:#666;margin-top:6px;"></div>
</div>

<button id="ui-toggle">☰</button>

<div id="ui" style="display:none;">
  <h1>SATELLITE TRACKER</h1>
  <div class="subtitle">Real-time orbital visualization — SGP4</div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="filter-tab">フィルター</button>
    <button class="tab-btn" data-tab="search-tab">検索</button>
  </div>

  <!-- FILTER TAB -->
  <div class="tab-content active" id="filter-tab">
    <div class="stat">表示中: <span id="visible-count">0</span> / <span id="total-count">0</span></div>
    <div class="stat">時刻: <span id="update-time">—</span></div>

    <div class="section">
      <label>国・地域</label>
      <div class="tags" id="country-filters"></div>
    </div>
    <div class="section">
      <label>衛星種別</label>
      <div class="tags" id="purpose-filters"></div>
    </div>
    <div class="section">
      <label>センサー / ミッション</label>
      <div class="tags" id="detail-filters"></div>
    </div>
    <div class="section">
      <label>軌道カテゴリ</label>
      <div class="tags" id="orbit-filters"></div>
    </div>
    <div class="section">
      <label>高度 (km)</label>
      <input type="range" id="alt-min" min="0" max="50000" value="0" step="100">
      <div class="range-labels"><span>下限: <span id="alt-min-val">0</span> km</span></div>
      <div style="height:6px"></div>
      <input type="range" id="alt-max" min="0" max="50000" value="50000" step="100">
      <div class="range-labels"><span>上限: <span id="alt-max-val">50,000</span> km</span></div>
    </div>
    <div class="section">
      <label>色分け（実スケール）</label>
      <div class="legend-item"><div class="legend-dot" style="background:#7affc1;"></div>LEO (〜2,000 km)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffc87a;"></div>MEO (2,000–35,000 km)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff7aa0;"></div>GEO (~35,786 km)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c07aff;"></div>HEO (>36,000 km)</div>
    </div>
  </div>

  <!-- SEARCH TAB -->
  <div class="tab-content" id="search-tab">
    <input type="text" id="search-input" placeholder="衛星名、NORAD ID、種別で検索...">
    <div class="search-count" id="search-count"></div>
    <div id="search-results"></div>
  </div>
</div>

<!-- Command Palette -->
<div id="cmd-overlay">
  <div id="cmd-box">
    <input id="cmd-input" type="text" placeholder="衛星名・国・種別で検索... (例: japan sar, leo <500km)" autocomplete="off">
    <div id="cmd-chips"></div>
    <div id="cmd-suggest"></div>
    <div id="cmd-count"></div>
    <div id="cmd-results"></div>
  </div>
</div>

<!-- Detail panel (bottom bar) -->
<div id="detail-panel">
  <button class="dp-close" id="dp-close">&times;</button>
  <div class="dp-name" id="dp-name"></div>
  <div id="dp-info"></div>
</div>

<div id="tooltip">
  <div class="name" id="tt-name"></div>
  <div class="detail" id="tt-owner"></div>
  <div class="detail" id="tt-type"></div>
  <div class="detail" id="tt-purpose"></div>
  <div class="detail" id="tt-launch"></div>
  <div class="detail" id="tt-norad"></div>
  <div class="detail" id="tt-alt"></div>
  <div class="detail" id="tt-vel"></div>
  <div class="detail" id="tt-lat"></div>
  <div class="detail" id="tt-period"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/satellite.js@5.0.0/dist/satellite.min.js"></script>

<script>
const EARTH_RADIUS_KM = 6371;
const DEG2RAD = Math.PI / 180;
const PI = Math.PI;

function altToRadius(altKm) { return altKm <= 0 ? 1.01 : 1 + altKm / EARTH_RADIUS_KM; }

const DATA_FILES = [{ file: 'data/active.json', label: '全アクティブ衛星' }];

const OWNER_NAMES = {
  'JPN':'日本','US':'アメリカ','CIS':'ロシア/CIS','PRC':'中国','ESA':'ESA','IND':'インド',
  'FR':'フランス','GER':'ドイツ','UK':'イギリス','IT':'イタリア','CA':'カナダ',
  'SKOR':'韓国','SPN':'スペイン','TURK':'トルコ','AUS':'オーストラリア','ARGN':'アルゼンチン',
  'SES':'SES','ITSO':'Intelsat','O3B':'O3b','GLOB':'Globalstar','NOR':'ノルウェー',
  'FIN':'フィンランド','UAE':'UAE','BRAZ':'ブラジル','ISRA':'イスラエル',
  'EUTE':'Eutelsat','TAIW':'台湾','INDO':'インドネシア','LUXE':'ルクセンブルク',
};
const LAUNCH_SITE_NAMES = {
  'AFETR':'ケープカナベラル','AFWTR':'ヴァンデンバーグ','TANSC':'種子島',
  'PLES':'プレセツク','TYMSC':'バイコヌール','SRILR':'スリハリコタ',
  'JSC':'酒泉','XSC':'西昌','TSC':'太原','WMLP':'ウェンチャン',
  'GUY':'ギアナ','VOST':'ボストチヌイ','KSCUT':'内之浦','SEAL':'海上',
};
const OBJ_TYPE_NAMES = {'PAY':'衛星','R/B':'ロケット本体','DEB':'デブリ','TBA':'未分類'};

// Top countries to show as filter buttons (with counts filled at runtime)
const COUNTRY_FILTERS = [
  {code:'JPN',label:'日本'},{code:'US',label:'米国'},{code:'PRC',label:'中国'},
  {code:'UK',label:'英国'},{code:'CIS',label:'ロシア'},{code:'IND',label:'インド'},
  {code:'ESA',label:'ESA'},{code:'FR',label:'仏'},{code:'IT',label:'伊'},
  {code:'SKOR',label:'韓国'},{code:'GER',label:'独'},{code:'CA',label:'加'},
];

const ORBIT_CATEGORIES = {
  'leo':{label:'LEO',active:true},'meo':{label:'MEO',active:true},
  'geo':{label:'GEO',active:true},'heo':{label:'HEO',active:true},
};

function classifyOrbit(a){return a<2000?'leo':a<35000?'meo':a<36500?'geo':'heo';}
function getColorForAltitude(a){return a<2000?new THREE.Color(0x7affc1):a<35000?new THREE.Color(0xffc87a):a<36500?new THREE.Color(0xff7aa0):new THREE.Color(0xc07aff);}

let scene,camera,renderer,earth,atmosphere,satPointCloud;
let allSatellites=[];
let satMetadata={};
let activeCountryFilter=null; // null=all, string=country code
let activePurposeFilter=null; // null=all, string=purpose key
let activeDetailFilter=null; // null=all, string or array of detail keys

// Purpose categories for filter buttons
const PURPOSE_FILTERS = [
  {key:'Communications',label:'通信'},
  {key:'Earth Observation',label:'地球観測'},
  {key:'Navigation/Global Positioning',label:'測位'},
  {key:'Space Science',label:'宇宙科学'},
  {key:'Surveillance',label:'監視'},
  {key:'Technology Development',label:'技術開発'},
  {key:'Earth Science',label:'地球科学'},
  {key:'Meteorological',label:'気象'},
];
// Detail → Japanese label for tooltip
const DETAIL_NAMES = {
  'Optical Imaging':'光学撮像','Radar Imaging':'レーダー撮像(SAR)',
  'Radar Imaging (SAR)':'SAR撮像','Multispectral Imaging':'マルチスペクトル撮像',
  'Hyperspectral Imaging':'ハイパースペクトル撮像','Infrared Imaging':'赤外撮像',
  'Video Imaging':'動画撮像','Meteorology':'気象観測',
  'Electronic Intelligence':'電子情報収集(ELINT)','Early Warning':'早期警戒',
  'Earth Science':'地球科学','Automatic Identification System (AIS)':'船舶追跡(AIS)',
  'Radar Imaging/Earth Science':'SAR/地球科学','Radio Spectrum Monitoring':'電波監視',
  'Meteorology, Automatic Identification System (AIS)':'気象/AIS',
  'Earth Science/Meterology':'地球科学/気象','Maritime Surveillance':'海洋監視',
  'Amateur Radio':'アマチュア無線','Internet of Things (IoT)':'IoT',
  'Data Relay':'データ中継','Remote Sensing':'リモートセンシング',
};
// Detail filters — group related types together
const DETAIL_FILTERS = [
  {key:'_sar',label:'SAR(レーダー)',match:['Radar Imaging','Radar Imaging (SAR)','Synthetic Aperture Radar (SAR)','Radar Imaging/Earth Science','Radar Surveillance']},
  {key:'_optical',label:'光学撮像',match:['Optical Imaging','Optical Imaging (video)','Optical Imaging/Meterology','Video Imaging','Imaging']},
  {key:'_multi',label:'マルチ/ハイパースペクトル',match:['Multispectral Imaging','Hyperspectral Imaging']},
  {key:'_ir',label:'赤外撮像',match:['Infrared Imaging']},
  {key:'_meteo',label:'気象観測',match:['Meteorology','Meteorology, Automatic Identification System (AIS)','Earth Science/Meterology','Meteorology/Earth Science']},
  {key:'_earthsci',label:'地球科学',match:['Earth Science']},
  {key:'_elint',label:'電子情報(ELINT)',match:['Electronic Intelligence']},
  {key:'_ais',label:'船舶追跡(AIS)',match:['Automatic Identification System (AIS)','Maritime Surveillance']},
  {key:'_earlywarning',label:'早期警戒',match:['Early Warning']},
  {key:'_radio',label:'電波監視',match:['Radio Spectrum Monitoring','Radio Frequency Monitoring']},
];
let mouse=new THREE.Vector2(-999,-999);
let raycaster=new THREE.Raycaster();
raycaster.params.Points.threshold=0.04;
let isDragging=false,dragMoved=false;
let prevMouse={x:0,y:0};
let spherical={theta:0,phi:PI/2,radius:4};
let touchDist=0;
let selectedSat=null;
let flyTarget=null;
let flyStart=null;
let orbitLine=null; // THREE.Line for orbital track
let cmdFilterFn=null; // function(sat)=>bool for command palette live highlight

// ============================================================
function ommToSatrec(omm){
  const nid=String(omm.NORAD_CAT_ID||0).padStart(5);
  const cls=omm.CLASSIFICATION_TYPE||'U';
  const intl=(omm.OBJECT_ID||'').replace(/^[0-9]{4}-/,m=>m).padEnd(8).substring(0,8);
  const ed=new Date(omm.EPOCH),yr=ed.getUTCFullYear(),ys=yr%100;
  const j1=new Date(Date.UTC(yr,0,1)),doy=(ed-j1)/86400000+1;
  const mmd=omm.MEAN_MOTION_DOT||0,mmdd=omm.MEAN_MOTION_DDOT||0,bs=omm.BSTAR||0;
  const et=omm.EPHEMERIS_TYPE||0,esn=omm.ELEMENT_SET_NO||999;
  function fE(v){if(v===0)return' 00000-0';const s=v<0?'-':' ',a=Math.abs(v),e=Math.floor(Math.log10(a)),m=a/Math.pow(10,e);return`${s}${(m*100000).toFixed(0).padStart(5,'0').substring(0,5)}${e>=0?'+':'-'}${Math.abs(e)}`;}
  function fM(v){if(v===0)return' .00000000';return(v<0?'-':' ')+Math.abs(v).toFixed(8).replace(/^0\./,'.');}
  let l1=['1 ',nid,cls,' ',intl.padEnd(8),' ',String(ys).padStart(2,'0'),doy.toFixed(8).padStart(12,'0'),' ',fM(mmd),' ',fE(mmdd),' ',fE(bs),' ',String(et),' ',String(esn).padStart(4)].join('').padEnd(68).substring(0,68);
  l1+=cksum(l1);
  const ecc=(omm.ECCENTRICITY||0).toFixed(7).replace('0.','');
  let l2=['2 ',nid,' ',(omm.INCLINATION||0).toFixed(4).padStart(8),' ',(omm.RA_OF_ASC_NODE||0).toFixed(4).padStart(8),' ',ecc.padStart(7,'0'),' ',(omm.ARG_OF_PERICENTER||0).toFixed(4).padStart(8),' ',(omm.MEAN_ANOMALY||0).toFixed(4).padStart(8),' ',(omm.MEAN_MOTION||0).toFixed(8).padStart(11),String(omm.REV_AT_EPOCH||0).padStart(5)].join('').padEnd(68).substring(0,68);
  l2+=cksum(l2);
  return satellite.twoline2satrec(l1,l2);
}
function cksum(l){let s=0;for(let i=0;i<68;i++){const c=l[i];if(c>='0'&&c<='9')s+=parseInt(c);else if(c==='-')s+=1;}return String(s%10);}

// ============================================================
function initScene(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.01,1000);
  camera.position.set(0,0,4);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  document.body.appendChild(renderer.domElement);

  const earthGeo=new THREE.SphereGeometry(1,64,64);
  const earthTex=new THREE.TextureLoader().load('earth-texture-small.jpg');
  earth=new THREE.Mesh(earthGeo,new THREE.MeshPhongMaterial({map:earthTex,specular:0x111122,shininess:15}));
  scene.add(earth);

async function loadSatelliteData(){
  const st=document.getElementById('load-status');
  st.textContent='メタデータ読み込み中...';
  try{const r=await fetch('data/metadata.json');satMetadata=await r.json();}catch(e){console.warn(e);}

  st.textContent='OMM読み込み中...';
  let raw=[];
  for(const src of DATA_FILES){try{const r=await fetch(src.file);const d=await r.json();raw=raw.concat(d);st.textContent=`${d.length}件`;}catch(e){st.textContent='読み込み失敗';}}

  st.textContent=`${raw.length}件を変換中...`;
  let ok=0,ng=0;
  for(const omm of raw){
    try{
      const sr=ommToSatrec(omm);
      if(!satellite.propagate(sr,new Date()).position){ng++;continue;}
      const nid=String(omm.NORAD_CAT_ID||''),meta=satMetadata[nid]||{};
      allSatellites.push({
        name:omm.OBJECT_NAME||'Unknown',noradId:nid,satrec:sr,
        position:new THREE.Vector3(),altitude:0,velocity:0,lat:0,lon:0,orbitType:'leo',
        owner:meta.owner||'',launchDate:meta.launch||'',launchSite:meta.site||'',
        objType:meta.type||'',isJapanese:!!meta.jpn,
        purpose:meta.purpose||'',detail:meta.detail||'',users:meta.users||'',
      });ok++;
    }catch(e){ng++;}
  }
  st.textContent=`${ok} 衛星`;
  document.getElementById('total-count').textContent=ok.toLocaleString();
}

function updateSatellitePositions(){
  const now=new Date(),gmst=satellite.gstime(now);
  for(const sat of allSatellites){
    try{
      const pv=satellite.propagate(sat.satrec,now);
      if(!pv.position){sat.altitude=-1;continue;}
      const geo=satellite.eciToGeodetic(pv.position,gmst);
      sat.lat=satellite.degreesLat(geo.latitude);sat.lon=satellite.degreesLong(geo.longitude);
      sat.altitude=geo.height;sat.velocity=Math.sqrt(pv.velocity.x**2+pv.velocity.y**2+pv.velocity.z**2);
      sat.orbitType=classifyOrbit(sat.altitude);
      const r=altToRadius(sat.altitude),phi=(90-sat.lat)*DEG2RAD,theta=(sat.lon+180)*DEG2RAD;
      sat.position.set(r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
    }catch(e){sat.altitude=-1;}
  }
}

function createGlowTexture(){
  const s=64,c=document.createElement('canvas');c.width=s;c.height=s;
  const x=c.getContext('2d'),g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.07,'rgba(255,255,255,0.85)');
  g.addColorStop(0.15,'rgba(220,255,240,0.5)');g.addColorStop(0.35,'rgba(122,255,193,0.18)');
  g.addColorStop(0.6,'rgba(122,255,193,0.05)');g.addColorStop(1,'rgba(122,255,193,0)');
  x.fillStyle=g;x.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(c);t.needsUpdate=true;return t;
}

// ============================================================
let heoSprites=[];
const satVS=`
  attribute float phase; attribute float visible;
  varying vec3 vColor; varying float vAlpha;
  uniform float uTime;
  void main(){
    vColor=color;
    float speed=0.8+phase*0.6;
    float shimmer=0.7+0.3*sin(uTime*speed+phase*6.2831);
    vAlpha=shimmer*visible;
    vec4 mv=modelViewMatrix*vec4(position,1.0);
    gl_PointSize=(0.09+shimmer*0.03)*(300.0/-mv.z);
    gl_Position=projectionMatrix*mv;
  }`;
const satFS=`
  varying vec3 vColor; varying float vAlpha;
  uniform sampler2D uGlowMap;
  void main(){
    if(vAlpha<0.01)discard;
    vec4 t=texture2D(uGlowMap,gl_PointCoord);
    gl_FragColor=vec4(vColor*t.rgb*vAlpha,t.a*vAlpha);
  }`;

function createSatelliteCloud(){
  const n=allSatellites.length,geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(n*3),3));
  geo.setAttribute('color',new THREE.BufferAttribute(new Float32Array(n*3),3));
  const ph=new Float32Array(n),vi=new Float32Array(n);
  for(let i=0;i<n;i++){ph[i]=Math.random();vi[i]=1;}
  geo.setAttribute('phase',new THREE.BufferAttribute(ph,1));
  geo.setAttribute('visible',new THREE.BufferAttribute(vi,1));
  const mat=new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0},uGlowMap:{value:createGlowTexture()}},
    vertexShader:satVS,fragmentShader:satFS,vertexColors:true,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
  });
  satPointCloud=new THREE.Points(geo,mat);scene.add(satPointCloud);
  for(let i=0;i<n;i++)allSatellites[i]._spriteIndex=-1;
}

function getOrCreateSprite(sat,tex){
  if(sat._sprite)return sat._sprite;
  const m=new THREE.SpriteMaterial({map:tex,color:getColorForAltitude(sat.altitude).getHex(),transparent:true,opacity:0.9,blending:THREE.AdditiveBlending,depthWrite:false});
  const s=new THREE.Sprite(m);scene.add(s);sat._sprite=s;heoSprites.push(s);return s;
}

const glowTexRef={current:null};
const HIGHLIGHT_COLOR=new THREE.Color(0xff4444); // bright red-orange for highlighted satellites
const DIM_ALPHA=0.08; // very dim for non-highlighted when a filter is active
const SELECTED_COLOR=new THREE.Color(0xff2222); // selected satellite from search

function hasActiveHighlight(){
  return activeCountryFilter||activePurposeFilter||activeDetailFilter||cmdFilterFn;
  // Note: selectedSat alone does NOT trigger dimming — only filters do
}

function isHighlighted(sat){
  if(selectedSat&&sat===selectedSat)return 'selected';
  // Command palette live filter takes priority
  if(cmdFilterFn){return cmdFilterFn(sat)?'highlighted':false;}
  const matchCountry=!activeCountryFilter||sat.owner===activeCountryFilter;
  const matchPurpose=!activePurposeFilter||sat.purpose===activePurposeFilter;
  const matchDetail=!activeDetailFilter||activeDetailFilter.includes(sat.detail);
  if(activeCountryFilter&&!matchCountry)return false;
  if(activePurposeFilter&&!matchPurpose)return false;
  if(activeDetailFilter&&!matchDetail)return false;
  if(activeCountryFilter||activePurposeFilter||activeDetailFilter)return 'highlighted';
  return 'normal';
}

function syncPointCloud(){
  if(!satPointCloud)return;
  if(!glowTexRef.current)glowTexRef.current=createGlowTexture();
  const altMin=parseFloat(document.getElementById('alt-min').value);
  const altMax=parseFloat(document.getElementById('alt-max').value);
  const pos=satPointCloud.geometry.attributes.position.array;
  const col=satPointCloud.geometry.attributes.color.array;
  const vis=satPointCloud.geometry.attributes.visible.array;
  const highlighting=hasActiveHighlight();
  let cnt=0,hlCnt=0;

  for(let i=0;i<allSatellites.length;i++){
    const sat=allSatellites[i];
    // Basic visibility: altitude range + orbit category
    const inRange=sat.altitude>=0&&sat.altitude>=altMin&&sat.altitude<=altMax&&
      ORBIT_CATEGORIES[sat.orbitType]?.active;

    if(!inRange){
      pos[i*3]=0;pos[i*3+1]=0;pos[i*3+2]=-999;vis[i]=0;
      col[i*3]=0;col[i*3+1]=0;col[i*3+2]=0;
      if(sat._sprite)sat._sprite.visible=false;
      continue;
    }

    cnt++;
    // Always check selectedSat; only dim others when filters are active
    const hlState=(selectedSat&&sat===selectedSat)?'selected':(highlighting?isHighlighted(sat):'normal');

    // Determine color and brightness
    let c,alpha;
    if(hlState==='selected'){
      c=SELECTED_COLOR;alpha=1.0;hlCnt++;
    }else if(hlState==='highlighted'){
      c=HIGHLIGHT_COLOR;alpha=1.0;hlCnt++;
    }else if(hlState==='normal'&&!highlighting){
      c=getColorForAltitude(sat.altitude);alpha=1.0;
    }else{
      // Dimmed — still visible but very faint
      c=getColorForAltitude(sat.altitude);alpha=DIM_ALPHA;
    }

    // Selected satellite ALWAYS gets a sprite (even LEO) so it stands out
    if(hlState==='selected'){
      pos[i*3]=0;pos[i*3+1]=0;pos[i*3+2]=-999;vis[i]=0;
      const sp=getOrCreateSprite(sat,glowTexRef.current);
      sp.visible=true;sp.position.copy(sat.position);
      sp.scale.setScalar(Math.max(sat.position.length()*0.15,0.2));
      sp.material.color.set(SELECTED_COLOR);sp.material.opacity=1.0;
    }else if(sat.altitude>2000){
      pos[i*3]=0;pos[i*3+1]=0;pos[i*3+2]=-999;vis[i]=0;
      const sp=getOrCreateSprite(sat,glowTexRef.current);
      sp.visible=true;sp.position.copy(sat.position);
      sp.scale.setScalar(sat.position.length()*(hlState==='highlighted'?0.09:0.06));
      sp.material.color.set(c);sp.material.opacity=alpha;
    }else{
      pos[i*3]=sat.position.x;pos[i*3+1]=sat.position.y;pos[i*3+2]=sat.position.z;
      col[i*3]=c.r*alpha;col[i*3+1]=c.g*alpha;col[i*3+2]=c.b*alpha;
      vis[i]=alpha<0.1?0.12:1.0;
      if(sat._sprite)sat._sprite.visible=false;
    }
  }
  satPointCloud.geometry.attributes.position.needsUpdate=true;
  satPointCloud.geometry.attributes.color.needsUpdate=true;
  satPointCloud.geometry.attributes.visible.needsUpdate=true;
  const label=highlighting?`${hlCnt.toLocaleString()} 強調 / ${cnt.toLocaleString()} 表示`:cnt.toLocaleString();
  document.getElementById('visible-count').innerHTML=label;
}

// CLICK TO SELECT — on globe, click a satellite to show orbit + detail

function clickSelectSatellite(){
  if(!satPointCloud)return;
  raycaster.setFromCamera(mouse,camera);

  // Check point cloud (LEO)
  const hits=raycaster.intersectObject(satPointCloud);
  for(const h of hits){
    const sat=allSatellites[h.index];
    if(sat&&sat.altitude>0&&h.point.z>-900){
      selectSatOnGlobe(sat);return;
    }
  }
  // Check sprites (MEO/GEO/HEO)
  const st=allSatellites.filter(s=>s._sprite&&s._sprite.visible);
  if(st.length>0){
    const sh=raycaster.intersectObjects(st.map(s=>s._sprite));
    if(sh.length>0){
      const sat=st.find(s=>s._sprite===sh[0].object);
      if(sat&&sat.altitude>0){selectSatOnGlobe(sat);return;}
    }
  }
  // Clicked empty space — deselect
  if(selectedSat){
    selectedSat=null;clearOrbitTrack();
    document.getElementById('detail-panel').style.display='none';
    syncPointCloud();
  }
}

function selectSatOnGlobe(sat){
  selectedSat=sat;
  showOrbitTrack(sat);
  showDetailPanel(sat);
  syncPointCloud();
}

function initControls(){
  const el=renderer.domElement;
  // Mouse
  el.addEventListener('mousedown',e=>{isDragging=true;dragMoved=false;prevMouse.x=e.clientX;prevMouse.y=e.clientY;});
  el.addEventListener('mousemove',e=>{
    mouse.x=(e.clientX/window.innerWidth)*2-1;mouse.y=-(e.clientY/window.innerHeight)*2+1;
    if(isDragging){const dx=e.clientX-prevMouse.x,dy=e.clientY-prevMouse.y;
      if(Math.abs(dx)>1||Math.abs(dy)>1)dragMoved=true;
      spherical.theta-=dx*0.005;spherical.phi=Math.max(0.1,Math.min(PI-0.1,spherical.phi-dy*0.005));
      prevMouse.x=e.clientX;prevMouse.y=e.clientY;}
  });
  el.addEventListener('mouseup',()=>{
    if(!dragMoved){clickSelectSatellite();}
    isDragging=false;
  });
  el.addEventListener('mouseleave',()=>{isDragging=false;});
  el.addEventListener('wheel',e=>{spherical.radius=Math.max(1.3,Math.min(50,spherical.radius+e.deltaY*0.005));});

  // Touch — drag to rotate, pinch to zoom
  el.addEventListener('touchstart',e=>{
    if(e.touches.length===1){isDragging=true;dragMoved=false;prevMouse.x=e.touches[0].clientX;prevMouse.y=e.touches[0].clientY;}
    if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;touchDist=Math.sqrt(dx*dx+dy*dy);}
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&isDragging){
      const dx=e.touches[0].clientX-prevMouse.x,dy=e.touches[0].clientY-prevMouse.y;
      spherical.theta-=dx*0.005;spherical.phi=Math.max(0.1,Math.min(PI-0.1,spherical.phi-dy*0.005));
      prevMouse.x=e.touches[0].clientX;prevMouse.y=e.touches[0].clientY;
    }
    if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      const d=Math.sqrt(dx*dx+dy*dy);if(touchDist>0){spherical.radius=Math.max(1.3,Math.min(50,spherical.radius*(touchDist/d)));}touchDist=d;}
  },{passive:true});
  el.addEventListener('touchend',e=>{
    if(!dragMoved&&e.changedTouches.length===1){
      // Set mouse coords from touch for raycasting
      mouse.x=(e.changedTouches[0].clientX/window.innerWidth)*2-1;
      mouse.y=-(e.changedTouches[0].clientY/window.innerHeight)*2+1;
      clickSelectSatellite();
    }
    isDragging=false;touchDist=0;
  },{passive:true});

  window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
}

// FLY TO SATELLITE — smooth camera animation
// ============================================================
function flyToSatellite(sat){
  if(sat.altitude<=0)return;
  selectedSat=sat;
  // Compute target spherical coords to look at the satellite
  const p=sat.position;
  const targetTheta=Math.atan2(p.z,p.x);
  const targetPhi=Math.acos(Math.max(-1,Math.min(1,p.y/p.length())));
  const r=p.length();
  const targetRadius=Math.max(r*1.8,2.5); // pull back to see it

  flyStart={theta:spherical.theta,phi:spherical.phi,radius:spherical.radius};
  flyTarget={theta:targetTheta,phi:targetPhi,radius:targetRadius,startTime:performance.now(),duration:1200};

  showDetailPanel(sat);
  showOrbitTrack(sat);
}

function easeInOut(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

function updateFly(time){
  if(!flyTarget)return;
  const elapsed=time-flyTarget.startTime;
  const progress=Math.min(elapsed/flyTarget.duration,1);
  const t=easeInOut(progress);

  // Interpolate spherical coordinates
  // Handle theta wrapping
  let dTheta=flyTarget.theta-flyStart.theta;
  if(dTheta>PI)dTheta-=2*PI;
  if(dTheta<-PI)dTheta+=2*PI;

  spherical.theta=flyStart.theta+dTheta*t;
  spherical.phi=flyStart.phi+(flyTarget.phi-flyStart.phi)*t;
  spherical.radius=flyStart.radius+(flyTarget.radius-flyStart.radius)*t;

  if(progress>=1)flyTarget=null;
}

// ============================================================
// ORBIT TRACK — draw orbital path when satellite selected
// ============================================================
const ORBIT_REVOLUTIONS=10; // 10周分の軌道を表示

function showOrbitTrack(sat){
  clearOrbitTrack();
  if(!sat||sat.altitude<=0)return;

  const now=new Date();
  const meanMotion=sat.satrec.no*1440/(2*PI); // rev/day
  const periodMin=meanMotion>0?1440/meanMotion:90;
  const periodMs=periodMin*60*1000;
  const totalMs=periodMs*ORBIT_REVOLUTIONS;
  const totalHours=(totalMs/3600000).toFixed(1);
  const steps=ORBIT_REVOLUTIONS*120; // 120 points per revolution
  const points=[];

  for(let i=0;i<=steps;i++){
    const t=new Date(now.getTime()+(i/steps)*totalMs);
    try{
      const gmst=satellite.gstime(t);
      const pv=satellite.propagate(sat.satrec,t);
      if(!pv.position)continue;
      const geo=satellite.eciToGeodetic(pv.position,gmst);
      const lat=satellite.degreesLat(geo.latitude);
      const lon=satellite.degreesLong(geo.longitude);
      const alt=geo.height;
      const r=altToRadius(alt);
      const phi=(90-lat)*DEG2RAD;
      const theta=(lon+180)*DEG2RAD;
      points.push(new THREE.Vector3(
        r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta)
      ));
    }catch(e){}
  }

  if(points.length<10)return;

  // Color gradient: each revolution gets slightly different hue to show same vs different path
  const geo=new THREE.BufferGeometry().setFromPoints(points);
  const colors=new Float32Array(points.length*3);
  for(let i=0;i<points.length;i++){
    const progress=i/points.length;
    const rev=Math.floor(progress*ORBIT_REVOLUTIONS);
    // Cycle through colors per revolution to distinguish tracks
    const hue=(rev/ORBIT_REVOLUTIONS)*0.3; // 0 to 0.3 (green→cyan→blue shift)
    const alpha=1.0-progress*0.6; // fade over time
    const c=new THREE.Color().setHSL(0.45-hue,0.9,0.5+alpha*0.3);
    colors[i*3]=c.r*alpha; colors[i*3+1]=c.g*alpha; colors[i*3+2]=c.b*alpha;
  }
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));

  const mat=new THREE.LineBasicMaterial({
    vertexColors:true,transparent:true,opacity:0.7,
    depthWrite:false,blending:THREE.AdditiveBlending,
  });
  orbitLine=new THREE.Line(geo,mat);
  scene.add(orbitLine);

  // Store orbit info for detail panel
  sat._orbitInfo={revolutions:ORBIT_REVOLUTIONS,periodMin,totalHours};
}

function clearOrbitTrack(){
  if(orbitLine){scene.remove(orbitLine);orbitLine.geometry.dispose();orbitLine.material.dispose();orbitLine=null;}
}

// ============================================================
// COMMAND PALETTE — smart search with token parsing
// ============================================================
const CMD_SUGGESTIONS=[
  'japan sar','japan 地球観測','starlink','leo <500km','geo communications',
  'launched 2024','himawari','alos','gps','sentinel','iss',
  'sar','optical','韓国','中国 leo','ロシア geo',
];

// Token parser: split query into structured filters + freetext
function parseCommandTokens(query){
  const tokens=query.toLowerCase().split(/\s+/).filter(t=>t);
  const filters={countries:[],purposes:[],details:[],altMax:null,altMin:null,years:[],freetext:[]};
  const chips=[];

  for(const tok of tokens){
    // Country match
    let matched=false;
    for(const [code,name] of Object.entries(OWNER_NAMES)){
      if(tok===code.toLowerCase()||name.toLowerCase().includes(tok)){
        filters.countries.push(code);chips.push({label:`国: ${name}`,type:'country'});matched=true;break;
      }
    }
    if(matched)continue;

    // Altitude filter
    const altLt=tok.match(/^<(\d+)km?$/);
    if(altLt){filters.altMax=parseInt(altLt[1]);chips.push({label:`高度 <${altLt[1]}km`,type:'alt'});continue;}
    const altGt=tok.match(/^>(\d+)km?$/);
    if(altGt){filters.altMin=parseInt(altGt[1]);chips.push({label:`高度 >${altGt[1]}km`,type:'alt'});continue;}

    // Year
    const yearMatch=tok.match(/^(19|20)\d{2}$/);
    if(yearMatch){filters.years.push(tok);chips.push({label:`打上: ${tok}`,type:'year'});continue;}
    if(tok==='launched')continue; // skip keyword

    // Orbit type
    if(['leo','meo','geo','heo'].includes(tok)){
      filters.purposes.push('_orbit_'+tok);chips.push({label:tok.toUpperCase(),type:'orbit'});continue;
    }

    // Purpose
    for(const pf of PURPOSE_FILTERS){
      if(pf.label.toLowerCase().includes(tok)||pf.key.toLowerCase().includes(tok)){
        filters.purposes.push(pf.key);chips.push({label:pf.label,type:'purpose'});matched=true;break;
      }
    }
    if(matched)continue;

    // Detail/sensor match
    for(const df of DETAIL_FILTERS){
      if(df.label.toLowerCase().includes(tok)||df.key.replace('_','').includes(tok)){
        filters.details.push(...df.match);chips.push({label:df.label,type:'detail'});matched=true;break;
      }
    }
    if(matched)continue;

    // Freetext fallback
    filters.freetext.push(tok);
  }
  return {filters,chips};
}

function buildFilterFn(filters){
  return function(sat){
    if(filters.countries.length&&!filters.countries.includes(sat.owner))return false;
    if(filters.altMax!==null&&sat.altitude>filters.altMax)return false;
    if(filters.altMin!==null&&sat.altitude<filters.altMin)return false;
    if(filters.years.length){
      const y=sat.launchDate?sat.launchDate.substring(0,4):'';
      if(!filters.years.includes(y))return false;
    }
    for(const p of filters.purposes){
      if(p.startsWith('_orbit_')){
        if(sat.orbitType!==p.replace('_orbit_',''))return false;
      }else{
        if(sat.purpose!==p)return false;
      }
    }
    if(filters.details.length&&!filters.details.includes(sat.detail))return false;
    for(const ft of filters.freetext){
      const hay=(sat.name+' '+sat.noradId+' '+sat.purpose+' '+sat.detail+' '+(OWNER_NAMES[sat.owner]||'')).toLowerCase();
      if(!hay.includes(ft))return false;
    }
    return true;
  };
}

function initCommandPalette(){
  const overlay=document.getElementById('cmd-overlay');
  const input=document.getElementById('cmd-input');
  const chipsEl=document.getElementById('cmd-chips');
  const suggestEl=document.getElementById('cmd-suggest');
  const countEl=document.getElementById('cmd-count');
  const resultsEl=document.getElementById('cmd-results');
  let cmdDebounce=null;
  let cmdResults=[];
  let cmdActiveIdx=-1;

  // Build browsable categories for initial state
  function showSuggestions(){
    suggestEl.innerHTML='';
    resultsEl.innerHTML='';
    countEl.textContent='';

    // Count per category
    const countryCounts={},purposeCounts={},detailCounts={},orbitCounts={},yearCounts={};
    for(const sat of allSatellites){
      if(sat.altitude<=0)continue;
      if(sat.owner)countryCounts[sat.owner]=(countryCounts[sat.owner]||0)+1;
      if(sat.purpose)purposeCounts[sat.purpose]=(purposeCounts[sat.purpose]||0)+1;
      if(sat.detail)detailCounts[sat.detail]=(detailCounts[sat.detail]||0)+1;
      orbitCounts[sat.orbitType]=(orbitCounts[sat.orbitType]||0)+1;
      if(sat.launchDate){const y=sat.launchDate.substring(0,4);yearCounts[y]=(yearCounts[y]||0)+1;}
    }

    function makeSection(title,items){
      const sec=document.createElement('div');
      sec.style.cssText='padding:8px 14px;border-bottom:1px solid #1a1a1a;';
      sec.innerHTML=`<div style="font-size:9px;color:#555;margin-bottom:6px;">${title}</div>`;
      const wrap=document.createElement('div');
      wrap.style.cssText='display:flex;flex-wrap:wrap;gap:4px;';
      for(const item of items){
        const btn=document.createElement('button');btn.className='cmd-suggest-btn';
        btn.innerHTML=`${item.label} <span style="color:#444;margin-left:2px;">${item.count}</span>`;
        btn.addEventListener('click',()=>{input.value=item.query;input.dispatchEvent(new Event('input'));input.focus();});
        wrap.appendChild(btn);
      }
      sec.appendChild(wrap);
      return sec;
    }

    // Countries
    const countries=COUNTRY_FILTERS
      .map(cf=>({label:cf.label,count:countryCounts[cf.code]||0,query:cf.label.toLowerCase()}))
      .filter(c=>c.count>0)
      .sort((a,b)=>b.count-a.count);
    resultsEl.appendChild(makeSection('国・地域',countries));

    // Orbit types
    const orbits=[
      {label:'LEO 低軌道',count:orbitCounts['leo']||0,query:'leo'},
      {label:'MEO 中軌道',count:orbitCounts['meo']||0,query:'meo'},
      {label:'GEO 静止軌道',count:orbitCounts['geo']||0,query:'geo'},
      {label:'HEO 高軌道',count:orbitCounts['heo']||0,query:'heo'},
    ];
    resultsEl.appendChild(makeSection('軌道',orbits));

    // Purpose
    const purposes=PURPOSE_FILTERS
      .map(pf=>({label:pf.label,count:purposeCounts[pf.key]||0,query:pf.label.toLowerCase()}))
      .filter(p=>p.count>0)
      .sort((a,b)=>b.count-a.count);
    resultsEl.appendChild(makeSection('衛星種別',purposes));

    // Sensors
    const sensors=DETAIL_FILTERS
      .map(df=>{let c=0;for(const m of df.match)c+=(detailCounts[m]||0);return{label:df.label,count:c,query:df.label.split('(')[0].trim().toLowerCase()};})
      .filter(s=>s.count>0)
      .sort((a,b)=>b.count-a.count);
    resultsEl.appendChild(makeSection('センサー / ミッション',sensors));

    // Recent launch years (newest first, top 8)
    const years=Object.entries(yearCounts)
      .sort((a,b)=>b[0].localeCompare(a[0]))
      .slice(0,10)
      .map(([y,c])=>({label:y+'年',count:c,query:y}));
    resultsEl.appendChild(makeSection('打上年',years));

    // Quick combos
    const combos=[
      {label:'日本 SAR',query:'japan sar'},{label:'日本 地球観測',query:'japan 地球観測'},
      {label:'中国 LEO',query:'中国 leo'},{label:'米国 GEO',query:'米国 geo'},
      {label:'低軌道 <500km',query:'leo <500km'},{label:'Starlink',query:'starlink'},
      {label:'Sentinel',query:'sentinel'},{label:'ISS',query:'iss'},
    ];
    resultsEl.appendChild(makeSection('クイック検索',combos));
  }

  // Open
  function openPalette(){
    overlay.classList.add('open');
    input.value='';chipsEl.innerHTML='';resultsEl.innerHTML='';countEl.textContent='';
    cmdFilterFn=null;cmdActiveIdx=-1;
    showSuggestions();
    setTimeout(()=>input.focus(),50);
  }

  // Close
  function closePalette(){
    overlay.classList.remove('open');
    cmdFilterFn=null;cmdResults=[];
    syncPointCloud(); // reset highlight
  }

  // Keyboard shortcut: / to open
  document.addEventListener('keydown',e=>{
    if(e.key==='/'&&!e.ctrlKey&&!e.metaKey&&document.activeElement.tagName!=='INPUT'){
      e.preventDefault();openPalette();
    }
    if(e.key==='Escape'&&overlay.classList.contains('open')){closePalette();}
    // Arrow navigation
    if(overlay.classList.contains('open')){
      if(e.key==='ArrowDown'){e.preventDefault();cmdActiveIdx=Math.min(cmdActiveIdx+1,cmdResults.length-1);updateActiveResult();}
      if(e.key==='ArrowUp'){e.preventDefault();cmdActiveIdx=Math.max(cmdActiveIdx-1,-1);updateActiveResult();}
      if(e.key==='Enter'&&cmdActiveIdx>=0&&cmdResults[cmdActiveIdx]){
        e.preventDefault();selectResult(cmdResults[cmdActiveIdx]);
      }
    }
  });

  // Click backdrop to close
  overlay.addEventListener('click',e=>{if(e.target===overlay)closePalette();});

  // Search button in sidebar (reuse existing search tab button)
  // Also make the search tab open the palette instead
  const searchTabBtn=document.querySelector('[data-tab="search-tab"]');
  if(searchTabBtn){
    searchTabBtn.addEventListener('click',e=>{
      e.stopPropagation();openPalette();
      // Keep filter tab active
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelector('[data-tab="filter-tab"]').classList.add('active');
    });
  }

  function updateActiveResult(){
    resultsEl.querySelectorAll('.cmd-item').forEach((el,i)=>{
      el.classList.toggle('active',i===cmdActiveIdx);
      if(i===cmdActiveIdx)el.scrollIntoView({block:'nearest'});
    });
  }

  function selectResult(sat){
    // Set selectedSat BEFORE closing palette so syncPointCloud sees it
    selectedSat=sat;
    overlay.classList.remove('open');
    cmdFilterFn=null;cmdResults=[];
    // Now sync with selectedSat already set — satellite stays highlighted
    syncPointCloud();
    flyToSatellite(sat);
  }

  // Live search on input
  input.addEventListener('input',()=>{
    clearTimeout(cmdDebounce);
    cmdDebounce=setTimeout(()=>{
      const q=input.value.trim();
      if(!q){
        chipsEl.innerHTML='';cmdFilterFn=null;cmdResults=[];
        showSuggestions();syncPointCloud();return;
      }
      const {filters,chips}=parseCommandTokens(q);

      // Show chips
      chipsEl.innerHTML='';
      for(const c of chips){
        const el=document.createElement('span');el.className='cmd-chip';el.textContent=c.label;
        chipsEl.appendChild(el);
      }

      // Build filter and apply to globe immediately
      const fn=buildFilterFn(filters);
      cmdFilterFn=fn;
      syncPointCloud();

      // Find matches for result list
      cmdResults=[];cmdActiveIdx=-1;
      for(const sat of allSatellites){
        if(sat.altitude<=0)continue;
        if(fn(sat)){cmdResults.push(sat);if(cmdResults.length>=100)break;}
      }

      countEl.textContent=`${cmdResults.length}${cmdResults.length>=100?'+':''} 件がハイライト中`;

      // Render results
      resultsEl.innerHTML='';
      for(const sat of cmdResults){
        const item=document.createElement('div');item.className='cmd-item';
        const detailLabel=sat.detail?(DETAIL_NAMES[sat.detail]||sat.detail):'';
        const ownerLabel=OWNER_NAMES[sat.owner]||sat.owner||'';
        const yearLabel=sat.launchDate?sat.launchDate.substring(0,4):'';
        item.innerHTML=`
          <div class="ci-name${sat.isJapanese?' jpn':''}">${sat.name}</div>
          <div class="ci-sub">
            ${detailLabel?`<span class="ci-tag hl">${detailLabel}</span>`:''}
            ${sat.purpose?`<span class="ci-tag">${sat.purpose}</span>`:''}
            ${ownerLabel?`<span class="ci-tag">${ownerLabel}</span>`:''}
            ${yearLabel?`<span class="ci-tag">${yearLabel}</span>`:''}
            <span style="color:#333">${sat.altitude.toFixed(0)}km</span>
          </div>`;
        item.addEventListener('click',()=>selectResult(sat));
        resultsEl.appendChild(item);
      }
    },120);
  });
}

// ============================================================
// SEARCH (legacy tab — now opens command palette)
// ============================================================
let searchDebounce=null;

function initSearch(){
  const input=document.getElementById('search-input');
  const results=document.getElementById('search-results');
  const countEl=document.getElementById('search-count');

  input.addEventListener('input',()=>{
    clearTimeout(searchDebounce);
    searchDebounce=setTimeout(()=>doSearch(input.value.trim()),150);
  });

  function doSearch(query){
    results.innerHTML='';
    if(query.length<2){countEl.textContent='2文字以上で検索';return;}

    const q=query.toLowerCase();
    const matches=[];
    for(const sat of allSatellites){
      if(sat.altitude<=0)continue;
      const nameMatch=sat.name.toLowerCase().includes(q);
      const noradMatch=sat.noradId.includes(q);
      const purposeMatch=sat.purpose.toLowerCase().includes(q);
      const detailMatch=sat.detail.toLowerCase().includes(q);
      const ownerMatch=(OWNER_NAMES[sat.owner]||'').toLowerCase().includes(q)||sat.owner.toLowerCase().includes(q);
      if(nameMatch||noradMatch||purposeMatch||detailMatch||ownerMatch){
        matches.push(sat);
        if(matches.length>=100)break;
      }
    }

    countEl.textContent=`${matches.length}${matches.length>=100?'+':''} 件`;

    for(const sat of matches){
      const item=document.createElement('div');
      item.className='search-item';

      // Purpose tag
      let tagClass='';let tagLabel='';
      if(sat.purpose.includes('Earth')||sat.purpose.includes('Meteor')){tagClass='eo';tagLabel=sat.detail?(DETAIL_NAMES[sat.detail]||sat.detail):sat.purpose;}
      else if(sat.purpose.includes('Comm')){tagClass='comm';tagLabel='通信';}
      else if(sat.purpose.includes('Nav')){tagClass='nav';tagLabel='測位';}
      else if(sat.purpose.includes('Science')||sat.purpose.includes('Space')){tagClass='sci';tagLabel=sat.purpose;}
      else if(sat.purpose){tagLabel=sat.purpose;}

      const ownerLabel=OWNER_NAMES[sat.owner]||sat.owner||'';
      const tags=(tagLabel?`<span class="si-tag ${tagClass}">${tagLabel}</span>`:'')
        +(ownerLabel?`<span class="si-tag">${ownerLabel}</span>`:'')
        +(sat.launchDate?`<span class="si-tag">${sat.launchDate.substring(0,4)}</span>`:'');

      item.innerHTML=`
        <div class="si-name${sat.isJapanese?' jpn':''}">${sat.name}</div>
        <div class="si-meta">${tags} <span style="color:#444">NORAD:${sat.noradId} | ${sat.altitude.toFixed(0)}km</span></div>
      `;

      item.addEventListener('click',()=>{
        flyToSatellite(sat);
        // Switch to filter tab to show the 3D view
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
        document.querySelector('[data-tab="filter-tab"]').classList.add('active');
        document.getElementById('filter-tab').classList.add('active');
        // On mobile, close sidebar
        document.getElementById('ui').classList.remove('open');
        document.getElementById('ui-toggle').classList.remove('open');
      });
      results.appendChild(item);
    }
  }
}

function initTabs(){
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
      // Focus search input when switching to search tab
      if(btn.dataset.tab==='search-tab')setTimeout(()=>document.getElementById('search-input').focus(),100);
    });
  });

  // Detail panel close
  document.getElementById('dp-close').addEventListener('click',()=>{
    document.getElementById('detail-panel').style.display='none';
    selectedSat=null;clearOrbitTrack();
  });
}

// ============================================================
let lastPropTime=0;
function animate(time){
  requestAnimationFrame(animate);

  // Fly animation
  updateFly(time);

  camera.position.set(spherical.radius*Math.sin(spherical.phi)*Math.cos(spherical.theta),spherical.radius*Math.cos(spherical.phi),spherical.radius*Math.sin(spherical.phi)*Math.sin(spherical.theta));
  camera.lookAt(0,0,0);

  if(satPointCloud)satPointCloud.material.uniforms.uTime.value=time*0.001;
  const t=time*0.001;
  for(const sat of allSatellites){if(sat._sprite&&sat._sprite.visible){const p=sat._shimmerPhase||(sat._shimmerPhase=Math.random());sat._sprite.material.opacity=0.55+0.45*Math.sin(t*(0.8+p*0.6)+p*6.2831);}}

  if(time-lastPropTime>150){
    updateSatellitePositions();syncPointCloud();lastPropTime=time;
    // Update detail panel if satellite selected
    if(selectedSat&&selectedSat.altitude>0)showDetailPanel(selectedSat);
  }
  if(Math.floor(time/1000)!==Math.floor((time-16)/1000))document.getElementById('update-time').textContent=new Date().toLocaleTimeString('ja-JP');
  updateTooltip();renderer.render(scene,camera);
}

// ============================================================
async function main(){
  initScene();initControls();
  await loadSatelliteData();
  document.getElementById('loading').style.display='none';
  updateSatellitePositions();createSatelliteCloud();syncPointCloud();initUI();
  initTabs();initSearch();initCommandPalette();
  document.getElementById('update-time').textContent=new Date().toLocaleTimeString('ja-JP');
  requestAnimationFrame(animate);
}
main();
